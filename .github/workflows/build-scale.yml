name: Build Scale

on:
  workflow_dispatch:

jobs:
  build-packages:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --privileged
    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y build-essential debootstrap git python3-pip python3-venv squashfs-tools unzip libjson-perl rsync libarchive-tools

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout sources and build packages
        run: |
          git config --global --add safe.directory $PWD
          make checkout
          make packages

      - name: Cache built packages
        uses: actions/upload-artifact@v7
        with:
          name: built-packages
          path: ./tmp/pkgdir/
          retention-days: 3

      - name: Cache package hashes
        uses: actions/upload-artifact@v7
        with:
          name: pkg-hashes
          path: ./tmp/pkghashes/
          retention-days: 3

      - name: Cache bootstrap
        uses: actions/upload-artifact@v7
        with:
          name: cache-dir
          path: ./tmp/cache/
          retention-days: 3

  build-image:
    runs-on: ubuntu-latest
    needs: build-packages
    container:
      image: debian:12
      options: --privileged
    steps:
      - name: Add swap space
        run: |
          dd if=/dev/zero of=/tmp/swapfile bs=1M count=12288
          chmod 600 /tmp/swapfile
          losetup /dev/loop0 /tmp/swapfile
          mkswap /dev/loop0
          swapon /dev/loop0
          free -h

      - name: Install dependencies
        run: |
          apt update
          apt install -y build-essential debootstrap git python3-pip python3-venv squashfs-tools unzip libjson-perl rsync libarchive-tools

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup scale_build
        run: |
          git config --global --add safe.directory $PWD
          make check

      - name: Restore built packages
        uses: actions/download-artifact@v7
        with:
          name: built-packages
          path: ./tmp/pkgdir/

      - name: Restore package hashes
        uses: actions/download-artifact@v7
        with:
          name: pkg-hashes
          path: ./tmp/pkghashes/

      - name: Restore bootstrap cache
        uses: actions/download-artifact@v7
        with:
          name: cache-dir
          path: ./tmp/cache/

      - name: Build update image
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          . ./venv-${COMMIT_HASH}/bin/activate && scale_build update

      - name: Extract Artifact File
        run: |
          mkdir -p ./nvidia-driver
          unsquashfs -dest ./nvidia-driver -f ./tmp/update/rootfs.squashfs usr/share/truenas/sysext-extensions/nvidia.raw

      - name: Upload nvidia.raw Artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvidia-raw
          path: ./nvidia-driver/usr/share/truenas/sysext-extensions/nvidia.raw
